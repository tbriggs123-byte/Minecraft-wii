name: Build Wii (devkitPPC)

on:
  push:
    branches: [ dev, main ]
  pull_request:
    branches: [ dev, main ]
  workflow_dispatch:

jobs:
  build-wii:
    name: Build Minecraft.Client.dol
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitppc:latest

    env:
      DEVKITPRO: /opt/devkitpro
      DEVKITPPC: /opt/devkitpro/devkitPPC
      PATH: /opt/devkitpro/devkitPPC/bin:/opt/devkitpro/tools/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install wii-dev packages
        run: dkp-pacman -Sy --noconfirm wii-dev

      - name: Unzip Wii platform layer
        run: |
          unzip -o wii_platform_files.zip
          find Minecraft.Client/Platform/Wii -type f | sort
          ls Makefile.wii

      - name: Generate assets
        run: make -f Makefile.wii assets

      - name: Build
        run: make -f Makefile.wii -j$(nproc)

      - name: Upload .dol artifact
        uses: actions/upload-artifact@v4
        with:
          name: Minecraft-Wii-dol
          path: build_wii/bin/Minecraft.Client.dol
          if-no-files-found: error
